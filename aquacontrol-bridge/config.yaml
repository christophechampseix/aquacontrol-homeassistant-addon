name: AquaControl Bridge
version: "1.3.0"
slug: aquacontrol_bridge
description: AquaControl Bridge API mode
startup: services
boot: auto
host_network: true

arch:
  - aarch64
  - amd64

options:
  aquacontrol_url: ""
  bridge_token: ""
  bridge_id: "homeassistant-green"
  poll_interval_ms: 1500
  heartbeat_interval_ms: 15000
  request_timeout_ms: 8000
  max_concurrent_commands: 2

schema:
  aquacontrol_url: str
  bridge_token: str
  bridge_id: str
  poll_interval_ms: int
  heartbeat_interval_ms: int
  request_timeout_ms: int
  max_concurrent_commands: int
